name: Mr Skelly Bot Auto Poster
on:
  schedule:
    # 4 baar post (IST times) - evenly spread
    - cron: '30 4 * * *'   # 10:00 AM IST
    - cron: '30 8 * * *'   # 2:00 PM IST
    - cron: '30 12 * * *'  # 6:00 PM IST
    - cron: '30 15 * * *'  # 9:00 PM IST (peak time)
  workflow_dispatch:        # Manual 'Run' button
jobs:
  run_bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
      - name: Install Libraries
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install google-api-python-client google-auth-oauthlib google-auth-httplib2 requests moviepy==1.0.3 "numpy<2.0.0" instagrapi==1.17.0 groq
      - name: Run Main Script
        env:
          # Google Secrets
          G_CLIENT_SECRET: ${{ secrets.G_CLIENT_SECRET }}
          G_REFRESH_TOKEN: ${{ secrets.G_REFRESH_TOKEN }}
          # Drive Folders
          DRIVE_QUEUE_FOLDER: ${{ secrets.DRIVE_QUEUE_FOLDER }}
          DRIVE_DONE_FOLDER: ${{ secrets.DRIVE_DONE_FOLDER }}
          # Instagram Secrets
          INSTA_USERNAME: ${{ secrets.INSTA_USERNAME }}
          INSTA_PASSWORD: ${{ secrets.INSTA_PASSWORD }}
          INSTA_SETTINGS: ${{ secrets.INSTA_SETTINGS }}
          # Groq AI Caption
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python main.py
